artifact_id: vbtpro_unmapped_capability_reservoir_20260408
artifact_version: 1
artifact_type: reservoir_note
status: active_research
created_on: 2026-04-08
owner: codex
purpose: >
  Machine-first holding surface for VBT PRO capabilities, tool families, or design ideas
  that are valuable enough to preserve even when they do not yet map cleanly onto the
  current repo. This prevents repo-fit bias from causing useful general capabilities to be lost.

design_rule:
  statement: >
    The encyclopedia must preserve both:
    1. repo-mapped capabilities with exact insertion points
    2. unmapped-but-promising capabilities that may matter later for greenfield builds,
       shadow pipelines, operator tooling, or future redesigns

reservoir_classes:
  - class_id: future_greenfield_candidate
    meaning: likely useful in a future VBT-native shadow or rebuilt pipeline
  - class_id: useful_but_not_yet_placed
    meaning: valuable tool family with no clean current repo insertion point yet
  - class_id: research_only_general_capability
    meaning: useful for notebooks, experimentation, or analysis even without repo coupling
  - class_id: deferred_due_to_authority_constraints
    meaning: useful but blocked from current repo adoption by contract or topology constraints
  - class_id: waiting_for_atomic_recording
    meaning: known to exist, not yet normalized into atomic records

record_shape:
  required_fields:
    - stable_id
    - reservoir_class
    - short_name
    - summary
    - vbt_source_paths
    - why_preserve
    - future_use_modes
    - current_repo_mapping_status
    - status
  optional_fields:
    - possible_future_repo_targets
    - anti_patterns
    - blockers
    - linked_brainstorm_ids
    - notebook_surface

current_repo_mapping_status_enum:
  - unmapped
  - partially_mapped
  - blocked_by_authority
  - blocked_by_topology
  - greenfield_only

