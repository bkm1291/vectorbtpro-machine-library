normalization_rules:
  - every atomic record should cite exact absolute paths
  - record ids should be stable once created
  - one record should represent one durable finding only
  - a record may point to many repo targets, but only when the same capability applies cleanly to all of them
  - truth risk records should be separate from capability records even if they share source paths

relationship_model:
  capability_to_repo_fit:
    statement: capability records describe what exists; repo fit records describe where it should go
  capability_to_truth_risk:
    statement: truth risk records describe how the same capability can go wrong or what it can detect
  playbook_to_records:
    statement: playbook records should reference capability ids, repo fit ids, and truth risk ids rather than restating them
  surface_to_records:
    statement: notebook/script/test records should point to capability, repo fit, and truth risk records rather than duplicating their content

