artifact_id: vbtpro_atomic_record_schema_20260408
artifact_version: 1
artifact_type: schema_note
status: active_research
created_on: 2026-04-08
owner: codex
purpose: >
  Machine-first schema for atomic encyclopedia records. These records are intended to become
  the normalized unit for future capability, repo-fit, truth-risk, notebook, and playbook
  indexing once broad discovery stabilizes.

design_goal:
  statement: >
    Represent each durable finding as a small, explicit, queryable record that can be routed,
    grouped, filtered, and expanded into implementation guidance without rereading entire notes.

record_families:
  capability_record:
    stable_id_pattern: cap_<topic>_<short_name>
    required_fields:
      - stable_id
      - record_family
      - topic_family
      - short_name
      - summary
      - vbt_source_paths
      - repo_target_paths
      - adoption_mode
      - why_it_matters
      - status
    optional_fields:
      - value_statement
      - notebook_surface
      - test_surface
      - anti_patterns
      - source_line_hints
  repo_fit_record:
    stable_id_pattern: fit_<repo_area>_<short_name>
    required_fields:
      - stable_id
      - record_family
      - repo_target_path
      - repo_target_function_or_scope
      - current_role
      - recommended_vbt_family
      - adoption_mode
      - first_move
      - validation_hook
      - status
    optional_fields:
      - supporting_vbt_source_paths
      - truth_risks
      - notes
  truth_risk_record:
    stable_id_pattern: truth_<risk_family>_<short_name>
    required_fields:
      - stable_id
      - record_family
      - risk_family
      - short_name
      - risk_statement
      - detection_surface
      - repo_target_paths
      - validation_hook
      - severity
      - status
    optional_fields:
      - vbt_source_paths
      - anti_patterns
      - notebook_surface
      - test_surface
  notebook_script_test_record:
    stable_id_pattern: surf_<surface_family>_<short_name>
    required_fields:
      - stable_id
      - record_family
      - surface_family
      - artifact_or_target
      - goal
      - supporting_note_paths
      - repo_target_paths
      - status
    optional_fields:
      - expected_outputs
      - validation_scope
      - linked_playbook
  playbook_record:
    stable_id_pattern: play_<domain>_<short_name>
    required_fields:
      - stable_id
      - record_family
      - domain
      - short_name
      - implementation_goal
      - repo_target_paths
      - supporting_capability_ids
      - supporting_truth_risk_ids
      - required_validation
      - status
    optional_fields:
      - bounded_steps
      - stop_conditions
      - notebook_dependencies

