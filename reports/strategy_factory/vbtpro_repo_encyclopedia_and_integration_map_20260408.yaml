  - phase_id: 2
    title: meta_loop_cv_research_branch
    reason: fastest direct ML benefit with minimal execution risk
    outputs:
      - optional SplitterCV path in models.py
      - research-only scoring comparison
  - phase_id: 3
    title: blackwell_feature_augmentation
    reason: best place to exploit pattern/label features and Blackwell GPUs
    outputs:
      - VBT-derived pattern features
      - manifest version bump
  - phase_id: 4
    title: blackwell_portfolio_research_branch
    reason: natural place to evaluate VBT-native portfolio simulation against current rank-to-view logic
    outputs:
      - optional Portfolio.from_signals or from_optimizer evaluation branch
  - phase_id: 5
    title: parameterized_chunked_research
    reason: search-scale and runtime improvements after correctness and split integrity are established
    outputs:
      - bounded parameterized research mode
      - chunked hyperparameter candidate execution

what_fits_repo_best:
  verdict: minimal_intrusion_path_first_blackwell_gpu_specific_second
  rationale:
    - repo already has strong split authority and no-leak contracts
    - repo already uses vectorbtpro for execution, so internal VBT extension is easier than full workflow replacement
    - Blackwell is already an isolated ML lane and is the best place for more aggressive VBT-native experimentation
  avoid_first:
    - replacing current role-based split law with VBT-native split definitions as authority
    - replacing current artifact contracts before parity manifests exist
    - pushing pattern-derived features into truth-path reports before point-in-time validation

