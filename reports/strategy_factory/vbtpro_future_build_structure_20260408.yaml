future_build_objectives:
  - objective_id: FB1_best_possible_pipeline
    statement: >
      Design the best achievable pipeline using VBT PRO where it is strongest, without losing
      the truth, anti-leak, and validation lessons already recorded in the encyclopedia.
  - objective_id: FB2_shadow_pipeline_readiness
    statement: >
      Keep a clean route toward a VBT-native shadow pipeline even if the live repo remains
      adapter-first for a long time.
  - objective_id: FB3_anti_loss_of_unmapped_gold
    statement: >
      Ensure non-local or not-yet-placed VBT PRO capabilities remain available as future
      building blocks instead of being discarded because they do not fit the current repo yet.

