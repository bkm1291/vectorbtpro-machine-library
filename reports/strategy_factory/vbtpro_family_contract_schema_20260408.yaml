    - require_pair_cleaning
    - require_manifest_registration

normalization_rules:
  - split any mixed-output surface into separate atomic records when outputs differ in honesty_class
  - require output_field_role_map whenever a family emits more than one field
  - require provenance_fieldset linkage for any parameterized or target_only family
  - require contract_guard linkage for any record with forbidden_outputs or forbidden_consumers
  - route audit-only surfaces through audit_surface rather than feature_family or label_family

recommended_indexes:
  by_honesty:
    - honesty_class
    - use_constraint_class
    - routing_domain
  by_outputs:
    - output_contract_kind
    - output_field_prefix
    - family_kind
  by_risk:
    - contamination_risk_class
    - ambiguity_risk_class
    - companion_audit_surface
  by_repo_route:
    - routing_domain
    - allowed_consumers
    - forbidden_consumers

