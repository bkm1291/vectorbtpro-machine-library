artifact_id: vbtpro_family_contract_schema_20260408
artifact_version: 1
artifact_type: schema_note
status: active_research
created_on: 2026-04-08
owner: codex
purpose: >
  Dedicated machine-first schema for feature, label, signal, pattern, audit-surface,
  provenance, and contract-guard families. This preserves the richer organizer findings
  around honesty class, use constraints, output roles, and downstream routing.

design_goal:
  statement: >
    Split family definition from repo attachment so each output family can be routed by
    honesty, allowed consumers, artifact surfaces, provenance requirements, and risk.

new_atomic_family_kinds:
  - feature_family
  - label_family
  - signal_family
  - pattern_family
  - state_family
  - target_family
  - audit_surface
  - contract_guard
  - provenance_fieldset

family_kind_refinement:
  feature_family:
    subkinds:
      - trailing_indicator_feature
      - running_state_feature
      - event_timing_feature
      - density_feature
      - persistence_feature
      - benchmark_relative_feature
  label_family:
    subkinds:
      - future_stat_target
      - trend_target
      - reversal_target
      - stop_outcome_target
      - horizon_return_target
  signal_family:
    subkinds:
      - raw_signal_mask
      - cleaned_signal_mask
      - partitioned_signal_mask
      - ranked_signal_mask
      - paired_entry_exit_signal
  pattern_family:
    subkinds:
      - similarity_pattern_feature
      - pattern_hit_record
      - pattern_density_feature
      - pattern_recency_feature
      - pattern_duration_feature

router_keys:
  required:
    - family_kind
    - family_subkind
    - honesty_class
    - use_constraint_class
    - contract_granularity
    - output_contract_kind
    - routing_domain
    - downstream_role
    - temporal_alignment
    - contamination_risk_class
    - ambiguity_risk_class
  recommended:
    - upstream_dependency_kind
    - provenance_class
    - reset_dependency
    - pairing_requirement
    - aggregation_policy

