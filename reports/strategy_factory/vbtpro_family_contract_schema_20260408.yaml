    - optional_reset_signal
    - required_reset_signal
    - required_state_flip
  pairing_requirement:
    - none
    - entry_exit_pair
    - source_target_pair
    - signal_to_target_pair
    - pattern_to_similarity_pair
  aggregation_policy:
