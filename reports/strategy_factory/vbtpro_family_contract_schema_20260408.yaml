    - per_row_only
    - per_partition_allowed
    - per_range_allowed
    - per_artifact_allowed
  contamination_risk_class:
    - none
    - lookahead
    - overlap
    - stale_state
    - split_overlap
    - target_feature_mixing
    - paired_signal_conflict
  ambiguity_risk_class:
