target_end_state:
  statement: >
    The most efficient end-state is a durable internal reference system with thin routing
    layers and deep implementation-grade backing notes. It should support instant navigation,
    safe implementation, and future greenfield VBT-native design work without re-research.
  desired_shape:
    - one stable program note
    - one stable master index
    - a small set of routers:
      - topic router
      - repo path router
      - truth/honesty router
      - notebook/script/test router
    - one primary long-form encyclopedia
    - one deep repo-fit matrix
    - one unmapped capability reservoir
    - a small set of specialized handbooks:
      - Blackwell integration playbook
      - feature/signal/label playbook
      - truth/leakage/drift handbook
      - reporting/dashboard playbook
    - notebooks that mirror the handbook structure
  properties:
    - zero information loss
    - fast one-hop navigation
    - exact repo insertion guidance
    - explicit anti-pattern and validation layers
    - clean separation between:
      - authority contracts
      - research reference
      - implementation playbooks
      - future greenfield design
  what_makes_it_efficient:
    - no repeated rediscovery
    - no reliance on conversational memory
    - no need to reread the full encyclopedia for common tasks
    - direct routing from repo file or question type to the correct deep note
    - future code work can be driven from handbooks rather than raw mining notes
  ideal_library_shape_for_agent_use:
    routing_frontend:
      - program note for operating rules
      - master index for global routing
      - topic router for tool-family questions
      - repo path router for implementation questions
      - truth/honesty router for validation and anti-leak work
      - notebook/script/test router for runnable surfaces
    deep_reference_core:
      - one primary encyclopedia
      - one repo-fit matrix
      - one unmapped capability reservoir
      - one truth/drift handbook
      - one blackwell integration playbook
      - one feature/signal/label playbook
      - one reporting/dashboard playbook
    exploration_layer:
      - capability dump notebook
      - repo optimization notebook
      - parity/honesty notebooks
      - demo scripts
    authority_boundary:
      - repo command/artifact/architecture contracts always remain separately routed and easy to reach
  agent_first_design_preferences:
    - prefer exact section keys over rhetorical headings
    - prefer explicit registries over implicit relationships
    - prefer additive routers over one giant narrative note
    - prefer machine-readable field bundles over prose-only explanations
    - prefer one-hop retrieval into dense notes over wide shallow summaries
    - prefer durable file-based handoff over memory-based continuation
  ideal_record_shape:
    fields_every_durable_finding_should_have_when_practical:
      - stable_id
      - topic_family
      - repo_targets
      - vbt_sources
      - adoption_mode
      - value_statement
      - truth_or_drift_risk
      - validation_hook
      - notebook_or_test_surface
      - status
    rationale: >
      This record shape makes findings easy to sort, filter, route, and later convert into
      implementation playbooks without re-reading surrounding prose.

library_build_directives:
  directives:
    - treat the encyclopedia as an internal machine library
    - optimize every new artifact for agent lookup and downstream reuse
    - if a choice exists between human readability and stricter machine structure, choose stricter machine structure every time
    - preserve exact repo paths and exact VBT source paths whenever practical
    - maintain explicit routeability from objective to router to deep note to repo file
    - preserve valuable unmapped capabilities in a dedicated reservoir instead of dropping them
  forbidden_defaults:
    - do not optimize primarily for human narrative flow
    - do not optimize secondarily for human narrative flow either
    - do not rely on memory of prior chat turns as a structural layer
    - do not store important findings only in notebooks or agent replies

