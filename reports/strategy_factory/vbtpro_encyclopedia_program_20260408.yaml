primary_consumer_contract:
  primary_consumers:
    - codex_main_agent
    - delegated_subagents
    - future_machine_processes
  optimization_target:
    statement: >
      This library is being built for agent and machine use only. Human readability is not
      an optimization target. Retrieval speed, exact disambiguation, low-context lookup,
      stable routing, and safe handoff are the only relevant design goals.
  design_consequences:
    - machine retrieval efficiency takes priority over any prose preference
    - stable keys take priority over literary compression
    - routing layers take priority over human intuition
    - structured records take priority over prose-only explanations
    - human-oriented readability is irrelevant unless it also helps machine use

machine_optimization_contract:
  goals:
    - maximize parseability by future agents and scripts
    - minimize ambiguity in artifact roles and project phases
    - preserve stable ids and stable routing categories
    - keep structures additive and append-friendly
  conventions:
    ids_are_stable: true
    enums_preferred_over_freeform_where_practical: true
    line_hints_are_advisory_not_authoritative: true
    absolute_paths_preferred: true
    artifact_registration_required: true
    router_registration_required_for_major_topics: true
  preferred_status_values:
    project_phase:
      - in_progress
      - active_next
      - pending
      - parked
      - complete
    artifact_priority:
      - highest
      - medium
      - low
    adoption_mode:
      - adapter_first
      - overlay_research
      - keep_custom_or_gpu
      - greenfield_shadow_candidate
  normalization_rules:
    - use snake_case keys
    - use flat lists for enumerations
    - avoid burying critical state only in prose paragraphs
    - keep every artifact path absolute
    - prefer explicit step ids and phase ids
    - separate authority artifacts from research artifacts explicitly

compiled_lookup_enforcement:
