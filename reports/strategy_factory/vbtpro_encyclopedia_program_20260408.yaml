implementation_model:
  build_order:
    - discovery first
    - indexing second
    - repo-fit detail third
    - notebook/playbook expansion fourth
    - shadow-pipeline design fifth
    - condensed operator views last
  adoption_order_for_repo_work:
    - adapter first
    - research overlay second
    - parity and honesty validation third
    - authority replacement only after explicit proof
  non_replacement_rule:
    - VBT PRO is not assumed to replace the entire repo
    - Blackwell GPU training remains GPU-native unless a future explicit redesign proves otherwise
    - repo authority contracts remain primary until deliberately superseded

implementation_state_machine:
  states:
    - state_id: discovered
      meaning: capability or repo-fit finding exists in durable notes
    - state_id: indexed
      meaning: finding is reachable through at least one router
    - state_id: classified
      meaning: finding is labeled as adapter_first, overlay_research, keep_custom_or_gpu, or greenfield_shadow_candidate
    - state_id: playbook_ready
      meaning: finding has enough detail for bounded implementation work
    - state_id: validated
      meaning: supporting validation strategy has been recorded
    - state_id: implementable
      meaning: can be handed off as a concrete build task without rereading broad discovery notes
  transition_rules:
    - do not mark a finding implementable if it is only discovered but not indexed
    - do not mark a finding playbook_ready without exact repo insertion points
    - do not mark a finding validated unless validation hooks or tests are named

build_rules:
  note_build_rules:
    - add to existing long-form notes before creating new overlapping notes
    - create new deep notes only when a topic becomes too large or deserves its own playbook
    - every new note must be registered in the master index
    - every new top-level topic must be reachable from at least one router
  indexing_rules:
    - line hints should be refreshed when major structure shifts
    - routers should prefer stable conceptual sections over fragile prose references
    - repo-path routes should point to the first practical implementation note, not all notes at once
  notebook_rules:
    - notebooks are exploratory and implementation-support tools, not primary storage
    - important findings discovered in notebooks must be copied into YAML notes
    - notebooks should link back to authority and encyclopedia artifacts
  anti_sprawl_rules:
    - do not fork redundant encyclopedia notes
    - do not bury key findings only inside agent replies
    - do not condense aggressively before coverage is mature
  machine_friendly_build_rules:
    - prefer stable section keys over prose-only headings
    - prefer explicit ids for steps, phases, and artifact groups
    - add new topic families as sibling keys rather than scattered prose
    - keep lists of artifacts and outputs explicit and machine-enumerable

validation_protocol:
  required_for_new_or_changed_yaml:
    - yaml must parse cleanly
    - artifact path must be added to the master index if it is part of the encyclopedia stack
    - router updates must preserve navigability
  required_for_new_or_changed_notebooks:
    - notebook JSON must parse cleanly
    - notebook purpose must be recorded in the master index if it is durable
  structural_validation_checks:
    - master index references existing files
    - router entries reference existing files
    - top-level program note remains consistent with the artifact stack
  content_validation_rules:
    - major findings should cite concrete file paths
    - anti-patterns and honesty risks should be explicit, not implied
    - repo-fit recommendations should separate adapter-first from replacement ideas
    - any future build playbook should preserve repo authority rules unless it explicitly declares a new research lane
  machine_validation_rules:
    - artifact ids should remain unique
    - artifact paths referenced by indexes should exist
    - router topics should point to existing artifacts
    - line hints should be refreshed after major structural edits
    - new artifacts should declare artifact_type, status, created_on, and owner

bounded_artifact_policy:
  rule:
    - keep one comprehensive encyclopedia note rather than many overlapping medium notes
    - use routers and indexes for speed, not duplication
    - add new deep notes only when a topic becomes too large or too implementation-heavy
  split_triggers:
    - a single section becomes too large to navigate even with routers
    - a topic needs its own implementation-grade playbook
    - a notebook grows beyond practical exploratory use
  preferred_future_splits:
    - vbtpro_truth_and_honesty_handbook
    - vbtpro_blackwell_integration_playbook
    - vbtpro_feature_and_signal_factory_handbook
    - vbtpro_reporting_and_dashboard_playbook

update_protocol:
  when_new_agent_findings_arrive:
    - add them to the long-form encyclopedia if they introduce new capability or new exact repo fit
    - add them to the file matrix if they change where a repo file should use VBT PRO
    - add them to routers if they open a new top-level navigation path
    - send the returning agent back out immediately on an uncovered slice
  when_a_new_note_is_created:
    - register it in the master index
    - add at least one route into it from either the topic router or repo path router
  when_line_numbers_shift_materially:
    - refresh line hints in the master index and routers
  when_context_is_running_long:
    - summarize state into the durable artifacts, not into ephemeral prose

agent_usage_policy:
  continuous_utilization: true
  rule:
    - agents should remain saturated on distinct uncovered slices
    - returned agents should be requeued immediately
    - main thread integrates, validates, indexes, and redirects
  role_split:
    agents:
      - mine new capability families
      - mine new repo fit points
      - mine anti-patterns and honesty risks
      - mine notebook/demo/test opportunities
    main_thread:
      - preserve findings
      - dedupe at the note layer
      - maintain indexes and routers
      - keep research coherent and durable

working_rules:
  discovery_rules:
    - bias toward uncovered surfaces
    - keep separate passes for capabilities, repo fit, anti-patterns, and honesty when useful
    - preserve even blocked or awkward ideas if they contain reusable lessons
  organization_rules:
    - build fast-access routes without deleting depth
    - prefer additive organization over destructive consolidation
  implementation_rules:
    - implementation notes must identify exact repo files and exact VBT PRO source anchors
    - build plans should separate safe first moves from aggressive future moves
    - truth/leakage/drift controls must be recorded before any major replacement proposal

indexing_requirements:
  every_major_topic_must_route_by:
    - tool_family
    - repo_file_or_subsystem
    - objective
  high_priority_objectives:
    - splitters_and_no_leak
    - blackwell_fit
    - pattern_features_and_labels
    - portfolio_and_reporting
    - schema_rows_columns_accuracy
    - truth_bias_leakage_drift
    - execution_chunking_params
    - dashboards_and_review
    - internal_ai_retrieval
  future_router_candidates:
    - truth_honesty_router
    - notebook_script_test_router
    - implementation_playbook_router

implementation_safety_policy:
  preserve_repo_authority:
    - lane command contract remains authoritative
    - lane artifact map remains authoritative
    - failure-regime pipeline architecture remains authoritative
  vbt_adoption_order:
    - adapter first
    - research overlay second
    - parity tests third
    - authority replacement only after proof
  explicit_non_goals:
    - do not assume VBT PRO replaces GPU ML training
    - do not let VBT splitters redefine holdout or promotion semantics by default
    - do not move too fast from research note to code mutation

