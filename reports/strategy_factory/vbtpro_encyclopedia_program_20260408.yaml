    - repo_path_to_truth_risk
    - repo_path_to_vbt_candidate
    - stage_id_to_truth_risk
    - module_id_to_stage_id

agent_enforcement_contract:
  miner_requirements:
    - output_stable_ids_when_capability_or_risk_is_reusable
    - emit_exact_vbt_paths_and_repo_paths
    - include_stage_ids_or_truth_risk_ids_when_known
    - propose_alias_candidates_when_a_lookup_pattern_is_repeated
    - preserve_unmapped_but_useful_capabilities_in_reservoir_or_batch_records
  organizer_requirements:
    - normalize_agent_returns_into_canonical_registries_when_schema_exists
    - do_not_leave_high_value_findings_only_in_agent_output
    - update_master_index_when_a_new_major_artifact_is_added
    - keep_vbtpro_lab_build_registry_current_when_new_repo_focus_changes
    - rebuild_and_validate_compiled_lookup_after_major_registry_changes
  phase_split_enforcement:
    miners_half_of_agents: true
    organizers_half_of_agents: true
    immediate_requeue_required: true

information_absorption_strategy:
  objective: >
    Organize the library around how a reasoning system actually finds and uses information:
    first route to the right scope, then pull only the minimum necessary deep context, then
    expand into implementation detail on demand.
  preferred_ingestion_units:
    - unit_id: capability_family
      meaning: one VBT PRO tool family with repo-relevant fit and anti-patterns
    - unit_id: repo_path_cluster
      meaning: one repo file or tightly related subsystem with explicit VBT fit classification
    - unit_id: truth_risk
      meaning: one leakage, drift, bias, schema, or honesty risk with exact controls
    - unit_id: implementation_move
      meaning: one bounded adoptable action with exact files, validation, and stop conditions
  preferred_retrieval_order:
    - identify objective or repo path first
    - route through master index or routers
    - open one long-form section only
    - pull supporting repo file matrix entries
    - only then expand into notebooks or secondary notes if needed
  anti_overload_rules:
    - avoid opening the full encyclopedia when one routed section is enough
    - avoid mixing authority contracts with speculative greenfield ideas in the same retrieval step
    - keep future playbooks narrower than the encyclopedia and broader than a single patch
  machine_best_practice:
    statement: >
      The library should be optimized for selective retrieval, not sequential reading.
      The right structure is many small access routes into a few dense authoritative notes.
  agent_first_rule:
    - optimize for question -> router -> deep section -> repo file flow
    - avoid any organization that depends on remembering prior chat context
    - prefer durable handoff files over conversational recap

primary_goal:
  statement: >
    Build a zero-loss, fast-access, implementation-grade encyclopedia of VBT PRO capabilities
    and exact repo integration points so future work does not depend on fragile conversational
    context or repeated rediscovery.
  success_conditions:
    - every major VBT PRO family relevant to the repo is mapped
    - every major repo subsystem has a file-level VBT fit classification
    - fast-access routing exists by topic, repo path, and objective
    - anti-patterns, truth risks, leakage risks, and drift risks are explicitly recorded
    - notebooks and implementation notes can be built from the index layer without rereading all long notes

mission:
  statement: >
    Build an internal encyclopedia that is fast to navigate, comprehensive at implementation
    depth, and resilient to context loss. The encyclopedia must support discovery, planning,
    safe adoption, validation, and later greenfield VBT-native design work.
  subgoals:
    - capture every materially relevant VBT PRO capability for this repo
    - map each capability to exact repo files, functions, and likely adoption order
    - preserve negative knowledge such as anti-patterns, leakage risks, and drift risks
    - support future coding work without re-mining the same research repeatedly

execution_split:
  phase_1_discovery:
    phase_id: phase_1_discovery
    objective:
      - saturate agents on discovery
      - keep widening coverage
      - preserve everything
      - avoid premature condensation
    agent_role: miners
    main_thread_role:
      - preserve findings
      - validate artifacts
      - maintain routing and structure
  phase_2_organization_and_writing:
    phase_id: phase_2_organization_and_writing
    objective:
      - normalize findings
      - dedupe overlaps
      - build topic indexes
      - build repo-path indexes
      - expand detailed code-use notes
      - write implementation playbooks
      - write honesty/leakage/drift notebooks
      - write VBT-native shadow-pipeline plans
    agent_role:
      - librarians
      - technical writers
      - detail expanders
    main_thread_role:
      - approve structure
      - keep contracts coherent
      - preserve zero-loss navigation

context_limit_strategy:
  design_principles:
    - never rely on chat memory as the primary store of research state
    - preserve zero information loss by adding indexes rather than compressing away detail
    - split long-form research from fast-access routing
    - keep durable line-hinted routers into long notes
    - maintain one stable master index that points to all current authoritative research artifacts
  anti_failure_rules:
    - no key finding should exist only in commentary or agent output
    - any major new capability family must be added to the encyclopedia and at least one router
    - any new repo-fit finding must be added to the file matrix or a successor matrix
    - any new truth/leakage/drift finding must be added to the honesty surfaces, not just the general note
    - notebooks should be index-backed, not ad hoc dumping grounds
    - active build status for vbtpro-lab must live in the build registry, not only in chat
    - repeated fast queries should be routed through alias registry, not memory

