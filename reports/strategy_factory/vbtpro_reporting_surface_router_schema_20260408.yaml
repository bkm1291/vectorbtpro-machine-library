    - data_shape
    - operator_audience
    - drift_signal_type
    - evidence_granularity
    - comparison_axis
    - sidecar_path_pattern
    - cacheability
    - reproducibility_requirements

field_enums:
  status:
    - candidate
    - recommended
    - staged
    - implemented
    - deferred
  priority:
    - p0
    - p1
    - p2
    - p3
  maturity:
    - near_term
    - medium_term
    - long_term
  touch_mode:
    - inline_extension
    - sidecar_extension
    - notebook_only
    - helper_only
    - script_only
  core_safety:
    - safe_outside_core
    - safe_sidecar_only
    - avoid_core_runtime
  data_shape:
    - scalar_summary
    - series
    - dataframe
    - matrix
    - record_table
    - html_report
  evidence_granularity:
    - summary_only
    - grouped_table
    - row_level
    - mixed
  cacheability:
    - cacheable
    - cacheable_with_source_fingerprint
    - non_cacheable

router_indexes:
