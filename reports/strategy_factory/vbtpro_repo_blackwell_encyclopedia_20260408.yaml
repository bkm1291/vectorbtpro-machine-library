      caution:
        - do not let VBT Splitter reorder or relabel the repo's artifact contract
        - do not adopt random CV in this lane unless the decision problem explicitly permits it

    - stage_id: strategy_execution_and_honest_validation
      current_role: >
        Execute strategy configs through VBT-backed sweeps, walkforward ranking, and
