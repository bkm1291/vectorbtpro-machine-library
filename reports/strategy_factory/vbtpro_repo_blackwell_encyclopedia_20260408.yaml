    - stage_id: candidate_dataset_and_labeling_meta_loop
      current_role: >
        Build candidate datasets, label realized outcomes, train a meta-model, score
        candidates, and evaluate accept/reject decisions.
      primary_files:
        - path: /home/benji/trade_scanner2/trade_scanner/strategy_factory/datasets.py
