  Encyclopedia-style map of VectorBT PRO capabilities that are relevant to this repo,
  with file-level implementation anchors, Blackwell GPU fit analysis, and a phased
  integration plan that preserves the repo's current no-leak and artifact contracts.

scope:
  objective:
    - map current repo architecture from ingestion through strategy execution, ML training, walkforward, holdout, and Blackwell evaluation
    - inventory installed VectorBT PRO capabilities that are relevant to ML, splitters, pattern features, optimization, simulation, caching, and performance
    - identify where each VBT PRO capability can be integrated into this repo
    - distinguish CPU-side VBT acceleration from external GPU ML work on Blackwell GPUs
  important_correction:
    observed: true
    statement: in this installed version, the public splitter surface is vbt.Splitter, not vbt.splitter
  local_authority:
    installed_env:
