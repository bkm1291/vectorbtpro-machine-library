repo_architecture_map:
  top_level_summary:
    observed: true
    statement: >
      The repo already contains two meaningful ML-adjacent execution surfaces:
      a custom candidate-gating/meta-model path and the Blackwell ensemble path.
      Both are built around custom split contracts and existing evaluation artifacts,
      not VBT-native splitter objects.
  stages:
    - stage_id: data_ingestion_and_history_validation
      current_role: >
        Pull, validate, resample, and stage time-series/history surfaces used by
        candidate generation, reference data, and strategy execution.
      primary_files:
        - path: /home/benji/trade_scanner2/trade_scanner/equities_llm_lab/history.py
          notable_functions:
            - discover_vectorbtpro_root
            - discover_vectorbtpro_python
            - import_vectorbtpro
            - resample_ohlcv_with_vectorbt
            - validate_ohlcv_frame_with_vectorbt
        - path: /home/benji/trade_scanner2/trade_scanner/equities_llm_lab/full_store.py
          notable_functions:
            - _external_validate
            - _validate_bar_frame
            - _configure_parallel_worker_runtime
      current_vbtpro_usage:
        - VBT PRO is already used for OHLCV resampling/validation hooks
        - VBT runtime path is discovered and threaded through the data stack
      vbtpro_fit:
        direct_fit:
          - split-aware validation of transformed frames via existing VBT-backed history utilities
          - additional chunking/jitting if any custom per-partition transforms are migrated toward VBT-compatible operations
        lower_fit:
          - ML splitters do not belong here directly
      recommended_integration_points:
        - add a thin VBT runtime capability manifest emitted by history/full_store so downstream stages know which VBT features are available
        - keep data ingestion deterministic and avoid introducing ML splitters at this stage

    - stage_id: strategy_family_feature_and_signal_generation
      current_role: >
        Build feature frames and family-specific signal sets for strategy sweeps and
        downstream research.
      primary_files:
        - path: /home/benji/trade_scanner2/trade_scanner/strategy_factory/vbt_equities.py
          notable_functions:
            - _cached_symbol_feature_frame
            - _read_symbol_feature_frame
            - run_strategy_sweep
        - path: /home/benji/trade_scanner2/trade_scanner/strategy_factory/vbt_metadata.py
          notable_functions:
            - PolygonMetadataData
            - build_polygon_metadata_cache
        - path: /home/benji/trade_scanner2/trade_scanner/strategy_factory/semantic_lane2_coarse_medium_feature_discovery.py
          notable_functions:
            - _derive_monthly_expanded_features
            - _derive_weekly_expanded_features
            - run_lane2_coarse_medium_feature_discovery
      current_vbtpro_usage:
        - VBT PRO runtime is already used indirectly in strategy execution and metadata integration
        - PolygonMetadataData is a concrete CustomData adapter
      vbtpro_fit:
        direct_fit:
          - PatternRanges.from_pattern_search
          - rolling_pattern_similarity
          - PATSIM
          - label generators such as TRENDLB and PIVOTLB for derived targets or auxiliary labels
          - VBT expression toolkit for compact feature transforms where the feature surface is already series/dataframe shaped
        recommended_changes:
          - create a dedicated adapter module, for example trade_scanner/strategy_factory/vbt_ml_features.py
          - keep handcrafted family signals in vbt_equities.py intact
          - add optional pattern-derived columns as additive features rather than replacing current features
          - use vbt_metadata.py as the integration point for point-in-time metadata enrichments that need to remain symbol/date aware
      concrete_repo_fit_examples:
        - candidate_pattern_feature_block:
            target_files:
              - /home/benji/trade_scanner2/trade_scanner/strategy_factory/blackwell_ensemble/feature_builders_gpu.py
              - /home/benji/trade_scanner2/trade_scanner/strategy_factory/semantic_lane2_coarse_medium_feature_discovery.py
            vbtpro_tools:
              - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/generic/ranges.py:2178
              - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/generic/accessors.py:1272
              - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/indicators/custom/patsim.py:167
            output_shape:
              - pattern_distance_feature_columns
              - rolling_similarity_feature_columns
