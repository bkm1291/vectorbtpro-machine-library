blackwell_gpu_guidance:
  core_position:
    observed: true
    statement: >
      The Blackwell GPUs should continue to do GPU-native ML training, prediction, and SHAP work.
      VBT PRO should be treated as a CPU-side acceleration/orchestration/research layer around
      those outputs, not a substitute for the GPU stack.
  why:
    - current GPU executor is explicitly built around XGBoost and device binding
    - local VBT PRO source does not expose a meaningful native GPU ML training stack
    - forcing VBT PRO into the GPU-training role would fight the current architecture
  good_blackwell_uses_of_vbtpro:
    - splitter adapter and CV diagnostics around current split_plan
    - CPU-side pattern feature generation before GPU fit
    - CPU-side portfolio simulation and allocation research over holdout scores
    - parameterization/chunking for ranking and evaluation hyperparameters
  poor_blackwell_uses_of_vbtpro:
    - replacing fit_gpu_base_models_development_oos
    - replacing fit_gpu_base_models_holdout
    - assuming VBT PRO is a GPU ML framework

anti_patterns_and_false_friends:
  summary:
    observed: true
    statement: >
      Several VBT PRO surfaces are powerful but are bad first moves for this repo because
      they hide chronology, split identity, or execution ownership. These are the main
      ways to misuse VBT PRO here.
  items:
    - anti_pattern_id: AP1
      item: using_vbt_splitter_as_new_authority
      why_bad: >
        Repo split authority already lives in validation_segments and Blackwell split_plan.
        VBT Splitter should be derived from those contracts, not allowed to redefine them.
      repo_refs:
        - /home/benji/trade_scanner2/trade_scanner/strategy_factory/validation_segments.py
        - /home/benji/trade_scanner2/trade_scanner/strategy_factory/blackwell_ensemble/splits.py
      vbt_refs:
        - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/generic/splitting/base.py:369
    - anti_pattern_id: AP2
      item: using_guess_method_in_restore_grade_code
      why_bad: >
        guess_method is exploratory and implicit. It is not appropriate where exact parity
        against frozen repo windows matters.
      vbt_refs:
        - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/generic/splitting/base.py:2076
    - anti_pattern_id: AP3
      item: adopting_split_or_cv_split_decorators_too_early
      why_bad: >
        Decorators hide split derivation, wrapping, and apply behavior. That makes parity
        debugging harder than explicit adapter code in this repo.
      vbt_refs:
        - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/generic/splitting/decorators.py:38
        - /home/benji/Downloads/vectorbt.pro-main/vectorbtpro/generic/splitting/decorators.py:334
    - anti_pattern_id: AP4
      item: rebuilding_blackwell_inner_folds_from_global_cv
      why_bad: >
        Blackwell inner tuning folds are subsets of outer-train. Rebuilding them from a
        global CV helper risks contaminating tuning with data outside the outer fold.
      repo_refs:
        - /home/benji/trade_scanner2/trade_scanner/strategy_factory/blackwell_ensemble/splits.py
        - /home/benji/trade_scanner2/trade_scanner/strategy_factory/blackwell_ensemble/gpu_executor.py
