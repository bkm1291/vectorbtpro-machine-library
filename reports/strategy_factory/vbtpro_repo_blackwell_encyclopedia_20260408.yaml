      version: 2026.3.1
    local_source_tree: /home/benji/Downloads/vectorbt.pro-main/vectorbtpro
  exclusions:
    - this note does not claim that VectorBT PRO replaces external GPU ML stacks such as XGBoost/CUDA
    - this note does not change any existing repo authority contract
    - this note does not assume that all discovered VBT PRO capabilities should be adopted

